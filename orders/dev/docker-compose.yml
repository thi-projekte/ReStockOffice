services:
  orders:
    image: ghcr.io/thi-projekte/restockoffice-orders:latest
    container_name: orders-service-dev
    ports:
      - "8081:8080" # Lokal erreichbar unter http://localhost:8081
    environment:
      QUARKUS_HTTP_CORS_ENABLED: "true"

      # Datenbank-Verbindung auf die lokale Orders-DB (Port 5431) umleiten
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://host.docker.internal:5431/orders_db
      QUARKUS_DATASOURCE_USERNAME: reStockOffice
      QUARKUS_DATASOURCE_PASSWORD: reStockOffice123$
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: update

      # Keycloak-Verbindung lokal
      QUARKUS_OIDC_ENABLED: "true"
      QUARKUS_OIDC_AUTH_SERVER_URL: http://host.docker.internal:8180/realms/restockoffice
      QUARKUS_OIDC_CLIENT_ID: restock-orders
      QUARKUS_OIDC_CREDENTIALS_SECRET: "restock-orders-secret"
      QUARKUS_OIDC_APPLICATION_TYPE: service

      # Der Postman-Rettungsanker für die Token-Validierung
      QUARKUS_OIDC_TOKEN_ISSUER: http://localhost:8180/realms/restockoffice

      # Process Engine (Lokal auf localhost umgeleitet)
      PROCESSENGINE_ABO_CONFIRMATION_START_URL: http://host.docker.internal:8080/api/abo-confirmation-process/change

    depends_on:
      orders-db-container:
        condition: service_healthy

  # 2. Die isolierte Orders-Datenbank
  orders-db-container:
    image: postgres:15
    container_name: orders-db-dev
    ports:
      - "5431:5432" # Mappt die DB auf Port 5431 deines PCs aus (User-DB hat 5434!)
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: reStockOffice
      POSTGRES_PASSWORD: reStockOffice123$
    volumes:
      - orders_dev_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U reStockOffice" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  orders_dev_db_data: