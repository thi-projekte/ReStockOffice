services:

  keycloak:
    image: ghcr.io/thi-projekte/restockoffice-keycloak:latest
    container_name: restockoffice-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: https://id.restockoffice.de
      KC_HOSTNAME_STRICT: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./realm-config.json:/opt/keycloak/data/import/realm-config.json
    networks:
      - nginx-proxy-manager

volumes:
  keycloak_data:

networks:
  nginx-proxy-manager:
    external: true