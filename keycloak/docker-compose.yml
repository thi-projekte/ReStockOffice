services:

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: restockoffice-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - restockoffice-network

