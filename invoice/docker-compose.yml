services:
  invoice:
    image: ghcr.io/thi-projekte/restockoffice-invoice:feature-invoice
    restart: unless-stopped

    networks:
      - nginx-proxy-manager
      - invoice-intern
    environment:
      RESTOCK_MAIL_SENDER: noreply@restockoffice.de
      RESTOCK_MAIL_REPLY_TO: support@restockoffice.de
      RESTOCK_MAIL_SUPPORT_EMAIL: support@restockoffice.de
      RESTOCK_MAIL_LOGO_URL: https://restockoffice.de/assets/logo_colored.png
      QUARKUS_MAILER_PASSWORD: ${QUARKUS_MAILER_PASSWORD}
      RESTOCK_MAIL_RESEND_BASE_URL: https://api.resend.com
      DB_JDBC_URL: jdbc:postgresql://db-container:5432/invoices_db
      DB_USERNAME: reStockOffice
      DB_PASSWORD: reStockOffice123$
      QUARKUS_PROFILE: prod
      KEYCLOAK_URL: http://id.restockoffice.de/realms/restockoffice

    depends_on:
      - db-container

  db-container:
    image: postgres:15
    ports:
      - "5439:5432"
    networks:
      - invoice-intern
    environment:
      POSTGRES_USER: reStockOffice
      POSTGRES_PASSWORD: reStockOffice123$
      POSTGRES_DB: invoices_db

    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:

networks:
  nginx-proxy-manager:
    external: true
  invoice-intern:
    driver: bridge
