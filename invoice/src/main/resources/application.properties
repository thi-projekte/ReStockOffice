
restock.mail.sender=${RESTOCK_MAIL_SENDER:noreply@restockoffice.de}
restock.mail.reply-to=${RESTOCK_MAIL_REPLY_TO:support@restockoffice.de}
restock.mail.support-email=${RESTOCK_MAIL_SUPPORT_EMAIL:support@restockoffice.de}
restock.mail.logo-url=${RESTOCK_MAIL_LOGO_URL:https://nbg1.your-objectstorage.com/restockoffice/assets/branding/logo_colored.png}
restock.mail.resend-api-key=${QUARKUS_MAILER_PASSWORD:}
restock.mail.resend-base-url=${RESTOCK_MAIL_RESEND_BASE_URL:https://api.resend.com}

invoice.logo.url=https://nbg1.your-objectstorage.com/restockoffice/assets/branding/logo_colored.jpg

quarkus.http.auth.permission.public.paths=/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.proactive=false
quarkus.oidc.enabled=false

%prod.quarkus.oidc.enabled=true
%prod.quarkus.oidc.auth-server-url=${KEYCLOAK_URL:https://users.restockoffice.de/realms/restockoffice}

# Datenbank-Typ und Ort
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:quarkus}
quarkus.datasource.password=${DB_PASSWORD:quarkus}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/invoice_db}

quarkus.datasource.devservices.enabled=false
quarkus.oidc.devservices.enabled=false

# Hibernate Einstellungen
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

quarkus.http.cors=true
quarkus.http.cors.origins=https://app.restockoffice.de
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD
quarkus.http.cors.headers=Content-Type,Authorization,Accept,Origin,X-Requested-With
quarkus.http.cors.access-control-allow-credentials=true

quarkus.oidc.client-id=restockoffice-spa
quarkus.oidc.application-type=service

%prod.quarkus.hibernate-orm.sql-load-script=import.sql
