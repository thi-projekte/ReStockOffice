spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/processengine}
    username: ${SPRING_DATASOURCE_USERNAME:processengine}
    password: ${SPRING_DATASOURCE_PASSWORD:processengine}
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource

  transaction:
    reactive:
      enabled: false

  jersey:
    application-path: /engine-rest

  security:
    mandatory-web-filter-logging: true
    oauth2:
      client:
        registration:
          keycloak:
            client-id: restockoffice-backend
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            token-uri: ${KEYCLOAK_TOKEN_URL:https://id.restockoffice.de/realms/restockoffice/protocol/openid-connect/token}
  management:
    security:
      enabled: false


cibseven.bpm:
  database:
    schema-update: true
  history-level: audit
  authorization:
    enabled: false
  filter:
    create: All tasks

logging:
  level:
    root: INFO

restockoffice:
  app-base-url: ${RESTOCKOFFICE_APP_BASE_URL:https://app.restockoffice.de}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://app.restockoffice.de}

# Metrics & Health
management:
  endpoint.health.probes.enabled: true
  endpoints:
    web.exposure.include: env,health,info,metrics

mailservice:
  base-url: ${MAILSERVICE_BASE_URL:http://confirmation-mails:8081}

ordersservice:
  base-url: ${ORDERS_SERVICE_URL:https://orders.restockoffice.de}

usersservice:
  base-url: ${USERS_SERVICE_URL:https://users.restockoffice.de}

articlesservice:
  base-url: ${ARTICLES_SERVICE_URL:https://articles.restockoffice.de}

deliveriesservice:
  base-url: ${DELIVERIES_SERVICE_URL:https://restocker-deliveries.restockoffice.de}
