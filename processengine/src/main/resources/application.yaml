camunda.bpm:
  history-level: audit
  authorization:
    enabled: false
  filter:
    create: All tasks

spring:
  jersey:
    application-path: /engine-rest

logging:
  level:
    root: INFO

# Metrics & Health
management:
  endpoint.health.probes.enabled: true
  endpoints:
    web.exposure.include: env,health,info,metrics
