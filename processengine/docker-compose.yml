services:
  processengine:
    image: ghcr.io/thi-projekte/restockoffice-processengine:latest
    container_name: restockoffice-processengine
    restart: unless-stopped
    environment:
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      SPRING_DATASOURCE_URL: jdbc:postgresql://restockoffice-db:5432/processengine
      SPRING_DATASOURCE_USERNAME: processengine
      SPRING_DATASOURCE_PASSWORD: processengine
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      CORS_ORIGINS: https://app.restockoffice.de,http://localhost:5173,http://127.0.0.1:5173
      MAILSERVICE_BASE_URL: http://confirmation-mails:8081
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      USERS_SERVICE_URL: https://users.restockoffice.de
      ORDERS_SERVICE_URL: https://orders.restockoffice.de
      ARTICLES_SERVICE_URL: https://articles.restockoffice.de
      DELIVERIES_SERVICE_URL: https://restocker-deliveries.restockoffice.de
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://id.restockoffice.de/realms/restockoffice
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID: restockoffice-backend
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    ports:
      - "8080:8080"
    networks:
      - processengine
      - nginx-proxy-manager
      - mailer
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: restockoffice-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: processengine
      POSTGRES_USER: processengine
      POSTGRES_PASSWORD: processengine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - processengine

volumes:
  postgres_data:

networks:
  nginx-proxy-manager:
    external: true
  mailer:
    external: true
  processengine:
    external: false
