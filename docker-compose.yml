services:
  processengine:
    image: ghcr.io/thi-projekte/restockoffice-processengine:1.0.0
    restart: unless-stopped
    depends_on:
      - keycloak
    environment:
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://keycloak:8080/realms/cib-seven}
      KEYCLOAK_ADMIN_URL: ${KEYCLOAK_ADMIN_URL:-http://keycloak:8080/admin/realms/cib-seven}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-cib-seven-local}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-cib-seven-secret}
      ENGINE_REST_BASE_URL: ${ENGINE_REST_BASE_URL:-https://pe.ReStockOffice.de}
    ports:
      - "${PROCESSENGINE_HTTP_PORT:-8080}:8080"

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8180}:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
