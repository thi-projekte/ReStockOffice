# Datenbank-Typ und Ort
quarkus.datasource.db-kind=postgresql


# Hibernate Einstellungen
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# OIDC Sicherheit
quarkus.http.auth.permission.public.paths=/users,/users/*
quarkus.http.auth.permission.public.policy=permit

quarkus.http.cors=true
quarkus.http.cors.origins=https://app.restockoffice.de
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD
quarkus.http.cors.headers=Content-Type, Authorization, Accept, Origin, X-Requested-With
quarkus.http.cors.access-control-allow-credentials=true

quarkus.http.filter.cors.header."Access-Control-Allow-Origin"=https://app.restockoffice.de
quarkus.http.filter.cors.matches=/.*

quarkus.s3.endpoint-override=https://nbg1.your-objectstorage.com
quarkus.s3.aws.region=nbg1
quarkus.s3.aws.credentials.type=static

quarkus.s3.aws.credentials.static-provider.access-key-id=${S3_ACCESS_KEY:none}
quarkus.s3.aws.credentials.static-provider.secret-access-key=${S3_SECRET_KEY:none}

quarkus.s3.path-style-access=true

quarkus.oidc.auth-server-url=${OIDC_URL:http://restockoffice-keycloak:8080/realms/restockoffice}
quarkus.oidc.token.issuer=${OIDC_ISSUER:http://restockoffice-keycloak:8080/realms/restockoffice}
quarkus.oidc.client-id=restock-users
quarkus.oidc.application-type=service
quarkus.oidc.credentials.secret=${QUARKUS_CREDENTIALS_SECRET:none}
quarkus.oidc.credentials.client-auth-method=client_secret_basic