# Devservices kappen
quarkus.datasource.devservices.enabled=false
quarkus.s3.devservices.enabled=false

# In-Memory DB f³r schnelle Tests
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test
quarkus.hibernate-orm.database.generation=drop-and-create

# ENTFERNE quarkus.oidc.enabled=false, falls vorhanden!
# Stattdessen nutzen wir die integrierten Mock-Eigenschaften f³r JWT-Tests:
quarkus.oidc.auth-server-url=https://localhost:8081/realms/demo
quarkus.oidc.client-id=dummy
quarkus.oidc.credentials.secret=dummy

# Verhindert Boot-Fehler des Keycloak-Admin-Clients im Test-Profil
quarkus.keycloak.admin-client.client-secret=dummy

# Standard-Base-URL f³r den HTTP-Client-Call im Code
deliveriesservice.base-url=http://localhost:8082

quarkus.oidc.enabled=false
keycloak.admin.client.secret=test-secret
