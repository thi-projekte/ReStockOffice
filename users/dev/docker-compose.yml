services:
  users:
    image: ghcr.io/thi-projekte/restockoffice-users:latest
    container_name: users-service-dev
    ports:
      - "8084:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://host.docker.internal:5434/users_db
      QUARKUS_DATASOURCE_USERNAME: reStockOffice
      QUARKUS_DATASOURCE_PASSWORD: reStockOffice123$

      # HIER BIEGEN WIR DIE INTERNEN QUARKUS-PROPERTIES AUF DEIN LOKALES KEYCLOAK UM:
      OIDC_URL: http://host.docker.internal:8180/realms/restockoffice
      ADMIN_URL: http://host.docker.internal:8180
      KEYCLOAK_SECRET_TOKEN: restockoffice-backend-secret
      QUARKUS_OIDC_TOKEN_ISSUER: http://localhost:8180/realms/restockoffice

      AWS_REGION: eu-central-1
      AWS_ACCESS_KEY_ID: dummy_key
      AWS_SECRET_ACCESS_KEY: dummy_secret
    depends_on:
      - users-db-container

  users-db-container:
    image: postgres:15
    container_name: users-db-dev
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: reStockOffice
      POSTGRES_PASSWORD: reStockOffice123$
      POSTGRES_DB: users_db
    volumes:
      - users_dev_db_data:/var/lib/postgresql/data

volumes:
  users_dev_db_data: