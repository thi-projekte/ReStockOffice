services:

  users:
    image: ghcr.io/thi-projekte/restockoffice-users:latest
    networks:
      - nginx-proxy-manager
      - users-intern
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-container:5432/users_db
      QUARKUS_DATASOURCE_USERNAME: reStockOffice
      QUARKUS_DATASOURCE_PASSWORD: reStockOffice123$
    depends_on:
      - db-container

  db-container:
    image: postgres:15
    networks:
      - users-intern
    environment:
      POSTGRES_USER: reStockOffice
      POSTGRES_PASSWORD: reStockOffice123$
      POSTGRES_DB: users_db

    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
networks:
  nginx-proxy-manager:
    external: true
  users-intern:
    driver: bridge