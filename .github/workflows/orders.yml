name: CI build orders

on:
  push:
    branches:
      - main
    tags:
      - "orders-v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: graalvm-community
          cache: maven

      - name: Orders build
        working-directory: orders
        run: |
          chmod +x mvnw
          ./mvnw clean verify -B

      - name: Package native
        working-directory: orders
        run: |
          chmod +x mvnw
          ./mvnw clean package -Pnative -DskipTests

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./orders
          file: ./orders/src/main/docker/Dockerfile.native-micro
          push: ${{ github.event_name == 'push' }}
          no-cache: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/restockoffice-orders:latest
            ghcr.io/${{ github.repository_owner }}/restockoffice-orders:2.0.8
            ghcr.io/${{ github.repository_owner }}/restockoffice-orders:${{ github.sha }}

      - name: Check native binary exists
        working-directory: orders
        run: ls -lah target
