## A basic GitHub Actions workflow for your Quarkus application.

name: CI build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: graalvm-community
          cache: maven

      - name: Test
        working-directory: ReStockOffice/orders
        run: ./mvnw verify -B

      - name: Package native
        working-directory: ReStockOffice/orders
        run: ./mvnw package -Dnative -DskipTests

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/src/main/docker/Dockerfile.native-micro
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/d135-1r43/pruefstein-web:latest
            ghcr.io/d135-1r43/pruefstein-web:${{ github.sha }}
