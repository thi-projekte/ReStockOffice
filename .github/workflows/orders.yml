name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - feature/orders
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: orders
        run: mvn -B package -DskipTests



      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
            context: ./orders
            file: ./orders/src/main/docker/Dockerfile.native-micro
            push: ${{ github.event_name == 'push' }}
            tags: |
              ghcr.io/${{ github.repository_owner }}/restockoffice-articles:latest
              ghcr.io/${{ github.repository_owner }}/restockoffice-articles:${{ github.sha }}