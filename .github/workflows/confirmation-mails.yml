name: Build and Push Confirmation Mails Image

on:
  push:
    branches:
      - main
      - confirmationMails
      - feature/confirmationMails
    tags:
      - "confirmation-mails-v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: graalvm-community
          cache: maven

      - name: Build with Maven
        working-directory: confirmation-mails
        run: |
          chmod +x mvnw
          ./mvnw -B verify

      - name: Package native
        working-directory: confirmation-mails
        run: |
          chmod +x mvnw
          ./mvnw -B package -Dnative -DskipTests

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image_tags
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/restockoffice-confirmation-mails"
          VERSION="${GITHUB_REF_NAME#confirmation-mails-v}"
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:latest"
            echo "${IMAGE_NAME}:${GITHUB_SHA}"
            if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == confirmation-mails-v* ]]; then
              echo "${IMAGE_NAME}:${VERSION}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./confirmation-mails
          file: ./confirmation-mails/src/main/docker/Dockerfile.native-micro
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.image_tags.outputs.tags }}
