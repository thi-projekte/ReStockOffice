name: Build and Push CIB seven Process Engine Image

on:
  push:
    branches:
      - main
      - 11-bestellprozess-ausführbar-in-cib-seven
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: thi-projekte/restockoffice-processengine

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
          server-id: mvn-cibseven-enterprise
          server-username: CIBSEVEN_MAVEN_USERNAME
          server-password: CIBSEVEN_MAVEN_PASSWORD

      - name: Build CIB seven process engine with Maven
        working-directory: processengine
        run: mvn -B -ntp package -DskipTests
        env:
          CIBSEVEN_MAVEN_USERNAME: ${{ secrets.CIBSEVEN_MAVEN_USERNAME }}
          CIBSEVEN_MAVEN_PASSWORD: ${{ secrets.CIBSEVEN_MAVEN_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=1.0.0
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./processengine
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
