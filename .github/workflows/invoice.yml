name: Build and Push invoice-Service Image

on:
  push:
    branches:
      - main
    tags:
      - 'invoice-v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: graalvm-community
          cache: maven

      - name: invoice build
        working-directory: invoice
        run: |
          chmod +x mvnw
          ./mvnw verify -B

      - name: Package native
        working-directory: invoice
        run: |
          chmod +x mvnw
          ./mvnw package -Dnative -DskipTests

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./invoice
          file: ./invoice/src/main/docker/Dockerfile.native-micro
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/restockoffice-invoice:1.0.0
            ghcr.io/${{ github.repository_owner }}/restockoffice-invoice:latest
            ghcr.io/${{ github.repository_owner }}/restockoffice-invoice:${{ github.sha }}