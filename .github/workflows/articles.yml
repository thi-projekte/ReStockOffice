name: CI build

on:
  push:
    branches: [ main, feature/articleservice ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: graalvm-community
          cache: maven

      - name: Articles
        working-directory: articles
        run: |
          chmod +x mvnw
          ./mvnw verify -B

      - name: Package native
        working-directory: articles
        run: |
          chmod +x mvnw
          ./mvnw package -Dnative -DskipTests

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./articles
          file: ./articles/src/main/docker/Dockerfile.native-micro
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/restockoffice:latest
            ghcr.io/${{ github.repository_owner }}/restockoffice:${{ github.sha }}