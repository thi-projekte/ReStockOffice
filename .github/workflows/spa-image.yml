name: Publish SPA Container Image

on:
  push:
    branches:
      - main
    tags:
      - "spa-v*"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./spa
          file: ./spa/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/restockoffice-spa:latest
            ghcr.io/${{ github.repository_owner }}/restockoffice-spa:${{ github.sha }}
