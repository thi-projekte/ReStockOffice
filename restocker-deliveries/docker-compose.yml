services:

  restocker-deliveries:
    image: ghcr.io/thi-projekte/restockoffice-restocker-deliveries:latest
    container_name: restocker-deliveries
    networks:
      - nginx-proxy-manager
      - restocker-deliveries
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://restocker-deliveries-db:5432/deliveries_db
      QUARKUS_DATASOURCE_USERNAME: reStockOffice
      QUARKUS_DATASOURCE_PASSWORD: reStockOffice123$
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: update
      QUARKUS_OIDC_ENABLED: "true"
      QUARKUS_OIDC_TOKEN_AUDIENCE: account
      QUARKUS_OIDC_AUTH_SERVER_URL: https://id.restockoffice.de/realms/restockoffice
      QUARKUS_OIDC_CLIENT_ID: restock-deliveries
      QUARKUS_OIDC_CREDENTIALS_SECRET: "BwUxqphre1ZsdsrHzc8f6KWqfKcIS9xx"
      QUARKUS_OIDC_APPLICATION_TYPE: service
      ORDERS_SERVICE_URL: https://orders.restockoffice.de
      USERS_SERVICE_URL: https://users.restockoffice.de
      #ORDERS_SERVICE_URL: http://orders:8080   # internal via nginx-proxy-manager network
      #USERS_SERVICE_URL: http://users:8080
      CORS_ORIGINS: https://app.restockoffice.de
    depends_on:
      - restocker-deliveries-db

  restocker-deliveries-db:
    image: postgres:15
    container_name: restocker-deliveries-db
    environment:
      POSTGRES_DB: deliveries_db
      POSTGRES_USER: reStockOffice
      POSTGRES_PASSWORD: reStockOffice123$
    volumes:
      - deliveries_db_data:/var/lib/postgresql/data
    networks:
      - restocker-deliveries
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reStockOffice"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  deliveries_db_data:

networks:
  nginx-proxy-manager:
    external: true
  restocker-deliveries:
    external: false
    driver: bridge
