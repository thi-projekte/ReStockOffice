services:
  orders:
    image: ghcr.io/thi-projekte/restockoffice-orders:2.0.5
    container_name: orders
    ports:
      - "8081:8080"
    networks:
      - nginx-proxy-manager
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-container:5432/orders_db
      QUARKUS_DATASOURCE_USERNAME: reStockOffice
      QUARKUS_DATASOURCE_PASSWORD: reStockOffice123$
      QUARKUS_OIDC_ENABLED: "true"
      QUARKUS_OIDC_AUTH_SERVER_URL: http://restockoffice-keycloak:8080/realms/cib-seven
    depends_on:
      - db-container

  db-container:
    image: postgres:15
    environment:
      POSTGRES_USER: reStockOffice
      POSTGRES_PASSWORD: reStockOffice123$
      POSTGRES_DB: orders_db
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - nginx-proxy-manager

volumes:
  db_data:

networks:
  nginx-proxy-manager:
    external: true