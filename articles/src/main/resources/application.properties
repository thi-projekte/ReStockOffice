# Datenbank-Typ und Ort
quarkus.datasource.db-kind=postgresql

quarkus.native.resources.includes=products.json

# Hibernate Einstellungen
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# OIDC Sicherheit
quarkus.http.auth.permission.public.paths=/articles,/articles/*
quarkus.http.auth.permission.public.policy=permit

# CORS global aktivieren
quarkus.http.cors=true

quarkus.http.cors.origins=https://app.restockoffice.de
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with, access-control-allow-origin
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.exposed-headers=Content-Disposition